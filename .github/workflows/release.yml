name: Release

on:
  release:
    types: [published]
  push:
    tags:
      - "v*.*.*"

jobs:
  build-and-publish:
    name: Build & publish nodepack
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build
        run: node ./scripts/build.mjs

      - name: Determine release tag
        id: tag
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Package nodepack archive
        run: |
          mkdir -p dist
          zip -r "dist/comfyui-connect-the-dots-${{ steps.tag.outputs.tag }}.zip" \
            __init__.py \
            build/ \
            README.md \
            LICENSE

      - name: Upload nodepack to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          files: dist/comfyui-connect-the-dots-${{ steps.tag.outputs.tag }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
